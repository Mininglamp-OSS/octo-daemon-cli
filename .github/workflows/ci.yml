# CI pipeline for octo-daemon-cli
name: CI

env:
  GO_VERSION: "1.26.1"

on:
  pull_request:
    branches:
      - main
      - "release/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -v ./...

      # Compile for every GOOS×GOARCH in the GoReleaser release matrix so a
      # platform-specific break (e.g. Unix-only syscalls without build tags)
      # surfaces on the PR instead of killing release-publish's
      # build-artifacts job on the first tag. Keep in lockstep with
      # .goreleaser.yaml goos/goarch.
      - name: Cross-compile release matrix
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build ./...
            echo "cross-compile ok: $target"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -race -shuffle=on -count=1 -timeout 5m ./...

  # npm packaging is part of the release path (npm-publish.yml runs these
  # same tests as a publish gate); running them on every PR surfaces
  # packaging regressions before a release tag is cut.
  npm-packaging:
    name: npm packaging tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Packaging tests
        run: node --test npm/scripts/prepare-packages.test.js

      # Guards the exact failure that broke the first v0.0.1 publish: npm
      # parses a bare relative dir like `build/octo-daemon-x` as a GitHub
      # user/repo shorthand and runs `git ls-remote`, not a local publish.
      # npm-publish.yml uses the `./`-prefixed form; this asserts that form
      # works AND that the bare form is still misresolved, so a regression
      # that drops the `./` is caught here at PR time.
      - name: Publish invocation smoke test
        run: |
          set -euo pipefail
          mkdir -p smoke/octo-daemon-pkg
          # printf, not a heredoc: a heredoc closing delimiter inside a YAML
          # block scalar is easy to misread (the indentation is stripped by
          # YAML before bash sees it, but reviewers and linters trip on it).
          # One obvious line removes the footgun.
          printf '%s\n' '{ "name": "@mininglamp-oss/octo-daemon-smoke", "version": "0.0.0-smoke", "files": ["index.js"] }' \
            > smoke/octo-daemon-pkg/package.json
          printf 'module.exports = {}\n' > smoke/octo-daemon-pkg/index.js

          # Fix form: ./-prefixed relative path publishes (dry-run) cleanly.
          npm publish --dry-run --ignore-scripts ./smoke/octo-daemon-pkg

          # Bug form: bare `dir/subdir` is github:dir/subdir → npm shells out
          # to `git ls-remote`. Capture the output and require that exact
          # signature: a bare non-zero exit is not enough (a transient
          # network/registry error would also satisfy it, and a future npm
          # that parses the path correctly would publish — both must fail the
          # test for the RIGHT reason, not pass it). timeout +
          # GIT_TERMINAL_PROMPT=0 keep a credential prompt from hanging.
          bare_out=$(GIT_TERMINAL_PROMPT=0 timeout 60 \
            npm publish --dry-run --ignore-scripts smoke/octo-daemon-pkg 2>&1 || true)
          if ! printf '%s' "$bare_out" | grep -q 'ls-remote'; then
            echo "::error::bare path did not misresolve as a git shorthand (no 'ls-remote' in output) — npm path-spec behavior changed or the publish failed for an unrelated reason; review the smoke test premise"
            printf '%s\n' "$bare_out"
            exit 1
          fi
          echo "publish invocation smoke test OK"

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m
