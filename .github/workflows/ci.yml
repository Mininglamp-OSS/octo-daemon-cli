# CI pipeline for octo-daemon-cli
name: CI

env:
  GO_VERSION: "1.26.1"

on:
  pull_request:
    branches:
      - main
      - "release/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -v ./...

      # Compile for every GOOS×GOARCH in the GoReleaser release matrix so a
      # platform-specific break (e.g. Unix-only syscalls without build tags)
      # surfaces on the PR instead of killing release-publish's
      # build-artifacts job on the first tag. Keep in lockstep with
      # .goreleaser.yaml goos/goarch.
      - name: Cross-compile release matrix
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build ./...
            echo "cross-compile ok: $target"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -race -shuffle=on -count=1 -timeout 5m ./...

  # npm packaging is part of the release path (npm-publish.yml runs these
  # same tests as a publish gate); running them on every PR surfaces
  # packaging regressions before a release tag is cut.
  npm-packaging:
    name: npm packaging tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Packaging tests
        run: node --test npm/scripts/prepare-packages.test.js

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          args: --timeout=5m
