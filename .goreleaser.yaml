version: 2

project_name: octo-daemon

before:
  hooks:
    - go mod tidy

builds:
  - id: octo-daemon
    binary: octo-daemon
    main: .
    env:
      - CGO_ENABLED=0
    # windows is intentionally absent: internal/upgrade.go uses Unix-only
    # restart logic (sh -c + flock + SysProcAttr.Setsid) with no build tags, so
    # GOOS=windows does not compile. Re-adding windows requires the build-tag
    # split tracked in the windows-support follow-up issue — and must stay in
    # lockstep with npm/scripts/prepare-packages.js's PLATFORMS, whose guard
    # test fails loudly if the two matrices ever drift.
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuildDate={{.Date}}

archives:
  - id: octo-daemon
    # Versioned archive names — consumed by npm-publish.yml's
    # prepare-packages step (and consistent with octo-cli's convention),
    # so the name must stay in lockstep with npm/scripts/prepare-packages.js.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
